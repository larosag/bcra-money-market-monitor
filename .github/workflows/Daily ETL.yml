name: ETL Diario — Tasas Plazo Fijo BCRA

on:
  schedule:
    # Corre todos los días a las 18:00 UTC (15:00 hora Argentina)
    # Los bancos ya publicaron sus tasas a esa hora
    - cron: "0 18 * * *"
  
  # Permite ejecución manual desde GitHub
  workflow_dispatch:

jobs:
  etl:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install pandas requests

      - name: Ejecutar ETL
        run: python etl.py

      - name: Commit y push de la base actualizada
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tasas_bancos.db
          git diff --cached --quiet || git commit -m "Actualización diaria — $(date -u +%Y-%m-%d)"
          git push